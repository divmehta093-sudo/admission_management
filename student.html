<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="student_form.css">
</head>
<body>

    <div class="form-box">
        <h2>Student Registration Form</h2>

        <form  id="studentForm" enctype="multipart/form-data">
            
            <h3>Personal Information</h3>
            <label>First Name</label>
            <input type="text" name="first_name" required>

            <label>Last Name</label>
            <input type="text" name="last_name">

            <label>Date of Birth</label>
            <input type="date" name="dob" required>

            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <h3>Parents Information</h3>
            <label>Father's Name</label>
            <input type="text" name="father_name">

            <label>Mother's Name</label>
            <input type="text" name="mother_name">

            <h3>Contact Information</h3>
            <label>Phone Number</label>
            <input type="tel" name="phone" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <h3>Address Details</h3>
            <label>Address</label>
            <input type="text" name="address">

            <label>City</label>
            <input type="text" name="city">

            <label>State</label>
            <input type="text" name="state">

            <label>Nationality</label>
            <input type="text" name="nationality">

            <h3>Admission Details</h3>
            <label>Upload Previous School Passing Certificate</label>
            <input type="file" name="passing_certificate" required>

            <label>Select Admission Class</label>
            <select name="admission_class" required>
                <option value="">Select Class</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10</option>
            </select>

            <button type="submit">Submit Registration</button>
        </form>
    </div>
    <script>
const form = document.getElementById('studentForm');

form.addEventListener('submit', async (e) => {
    e.preventDefault(); // Prevent default form submission

    const formData = new FormData(form); // Gather all form fields and files

    try {
        const res = await fetch('http://localhost:3000/register', {
            method: 'POST',
            body: formData
        });

        const text = await res.text();
        alert(text); // Show server response
        form.reset(); // Optional: clear form after submission
    } catch (err) {
        alert("Error: " + err.message);
    }
});
</script>


</body>
</html>
