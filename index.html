<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>

    <style>
        body {
            margin: 0;
            background: url("student.webp") center/cover no-repeat;
            height: 100vh;
            font-family: Arial, sans-serif;
            position: relative;
        }

        /* Blur Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("student.webp") center/cover no-repeat;
            filter: blur(4px);
            z-index: -1;
        }

        /* Header Box */
        .header-box {
            max-width: 900px;
            width: 90%;
            background-color: rgba(255,255,255,0.95);
            margin: 50px auto;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            gap: 20px;
            text-align: center;
        }

        .logo {
            width: 140px;
            height: auto;
        }

        h1 {
            color: #e28e33;
            font-size: 28px;
            margin: 0;
            font-weight: bold;
        }

        /* Buttons */
        .btn-box {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: .3s ease;
            width: 250px;
        }

        /* Registration Button */
        .std {
            background: #e28e33;
            color: white;
        }
        .std:hover {
            background: #c9751f;
            transform: scale(1.05);
        }

        /* Admin Button */
        #admin {
            background: #1e1e1e;
            color: white;
        }
        #admin:hover {
            background: black;
            transform: scale(1.05);
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 20px; }
            .logo { width: 110px; }
            .header-box { padding: 15px; }
            button { width: 200px; }
        }
    </style>

</head>

<body>

    <div class="header-box">
        <img src="logo.png" class="logo" alt="Academy Logo">
        <h1>WELCOME TO THE ADN SUCCESS ACADEMY</h1>
    </div>

    <div class="btn-box">
        <button class="std" onclick="window.location.href='student.html'">REGISTRATION</button>
        <button id="admin" onclick="window.location.href='admin_login.html'">ADMIN LOGIN</button>
    </div>

</body>
</html>
