<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin:0; padding:0; }
.login-box {
    max-width: 400px;
    margin: 100px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    border: 2px solid #1e1e1e;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
h2 { color:#1e1e1e; text-align:center; }
label { display:block; margin:10px 0 5px; font-weight:bold; }
input { width:100%; padding:8px 10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc; }
button { width:100%; padding:10px; background:#1e1e1e; color:white; border:none; border-radius:5px; cursor:pointer; }
button:hover { background:#000; }
</style>
</head>
<body>

<div class="login-box">
<h2>Admin Login</h2>
<form action="/admin_login" method="POST">
<label>Username</label><input type="text" name="username" required>
<label>Password</label><input type="password" name="password" required>
<button type="submit">Login</button>
</form>
</div>

</body>
</html>
